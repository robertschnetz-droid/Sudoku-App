<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert's Sudoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="titel">Mijn Sudoku's</h1>

    <ul id="sudokuLijst">
  </ul>

<div id="sudokuBord"></div>
<div id="knoppenBalk">
    <button id="terugKnop">🔙</button>
    <button id="vastzettenKnop">📌</button>
    <button id="opslaanKnop">💾</button>
    <button id="verwijderenKnop">🚮</button>
    <button id="afrondenKnop">✅</button>
    </div>

<button id="nieuweSudoku">➕ Nieuwe Sudoku</button>

<div id="popupMenu" style="display:none;">
    <button id="popup1">1</button>
    <button id="popup2">2</button>
    <button id="popup3">3</button><br>

    <button id="popup4">4</button>
    <button id="popup5">5</button>
    <button id="popup6">6</button><br>

    <button id="popup7">7</button>
    <button id="popup8">8</button>
    <button id="popup9">9</button><br>

    <button id="popupBackspace">⌫</button>
</div>

    <script src="app.js"></script>
</body>
</html>
